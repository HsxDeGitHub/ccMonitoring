name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: CC-Monitor-Windows.zip
            asset_path: dist/CC Monitor/
          - os: macos-latest
            artifact_name: CC-Monitor-macOS.zip
            asset_path: dist/CC Monitor.app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --name "CC Monitor" --windowed --noconfirm run.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.asset_path }}" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r "../${{ matrix.artifact_name }}" "CC Monitor.app"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
